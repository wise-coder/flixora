<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="monetag" content="fea4b12f857ff6c786674a5695dc95ec">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FeemX - Home</title>
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=20260422a">
</head>
<script src="https://quge5.com/88/tag.min.js" data-zone="236778" async data-cfasync="false"></script>
<body class="page-home" data-page="home">
    <div id="loader">
        <div class="spinner"></div>
    </div>

    <div class="app-shell">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <button class="sidebar-menu" type="button" aria-label="Open menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <a class="brand-link" href="index.html" aria-label="FeemX home">
                    <img class="brand-mark" src="logo.svg" alt="FeemX logo">
                    <span class="brand-text">FEEMX</span>
                </a>
            </div>

            <div class="sidebar-language">
                <span>ENGLISH</span>
                <span class="language-caret">v</span>
            </div>

            <nav class="sidebar-nav" data-sidebar-nav></nav>

            <div class="sidebar-footer">
                <p>Stream bold stories with the FeemX experience.</p>
            </div>
        </aside>

        <main class="content-area">
            <header class="topbar">
                <form class="topbar-search">
                    <input class="search-input" id="searchInput" type="search" placeholder="Search movies / TV shows"
                        aria-label="Search movies">
                </form>
                <div class="topbar-actions">
                    <a class="pill-btn ghost-btn" href="movie.html?id=2">Featured Pick</a>
                    <a class="pill-btn solid-btn" href="#trending">Browse Now</a>
                </div>
            </header>

            <section class="hero-panel animate-on-scroll" id="hero">
                <div class="hero-overlay"></div>
                <button class="hero-arrow hero-prev" type="button" aria-label="Previous feature">&#8249;</button>
                <div class="hero-copy">
                    <span class="eyebrow">Featured Movie</span>
                    <h1 id="heroTitle">Featured Movie</h1>
                    <p id="heroMeta">Premium streaming, handpicked for tonight.</p>
                    <p id="heroDesc">Experience cinematic excellence with our premium selection.</p>
                    <div class="hero-actions">
                        <button class="play-hero" id="heroPlayButton" type="button">Play Now</button>
                        <a class="hero-secondary" href="#trending">Explore Library</a>
                    </div>
                </div>
                <button class="hero-arrow hero-next" type="button" aria-label="Next feature">&#8250;</button>
                <div class="hero-dots" id="heroDots"></div>
            </section>

            <section class="content-section animate-on-scroll" id="trending">
                <div class="section-heading">
                    <h2>Trending Now</h2>
                    <span></span>
                </div>
                <div class="slider-section trending">
                    <button class="slider-controls prev" type="button">&#8249;</button>
                    <button class="slider-controls next" type="button">&#8250;</button>
                    <div class="slider-container trending-container"></div>
                </div>
            </section>

            <section class="content-section action animate-on-scroll" id="action">
                <div class="section-heading">
                    <h2>Action</h2>
                    <span></span>
                </div>
                <div class="slider-section">
                    <button class="slider-controls prev" type="button">&#8249;</button>
                    <button class="slider-controls next" type="button">&#8250;</button>
                    <div class="slider-container"></div>
                </div>
            </section>

            <section class="content-section comedy animate-on-scroll" id="comedy">
                <div class="section-heading">
                    <h2>Comedy</h2>
                    <span></span>
                </div>
                <div class="slider-section">
                    <button class="slider-controls prev" type="button">&#8249;</button>
                    <button class="slider-controls next" type="button">&#8250;</button>
                    <div class="slider-container"></div>
                </div>
            </section>

            <section class="content-section drama animate-on-scroll" id="drama">
                <div class="section-heading">
                    <h2>Drama</h2>
                    <span></span>
                </div>
                <div class="slider-section">
                    <button class="slider-controls prev" type="button">&#8249;</button>
                    <button class="slider-controls next" type="button">&#8250;</button>
                    <div class="slider-container"></div>
                </div>
            </section>
        </main>
    </div>

    <div id="movieModal">
        <div class="modal-content">
            <div class="modal-info" id="modalContent"></div>
            <button id="modalClose" type="button" aria-label="Close preview">&times;</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="config.js?v=20260423e"></script>
    <script src="script.js?v=20260423e"></script>
</body>

</html>
