name: Keep Render Awake

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: keep-render-awake
  cancel-in-progress: true

jobs:
  ping-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping backend health endpoint
        run: |
          curl --fail --silent --show-error --max-time 25 \
            "https://feemx.onrender.com/api/health"
