<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="monetag" content="fea4b12f857ff6c786674a5695dc95ec">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FeemX - Movie Detail</title>
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=20260422a">
</head>
<script>(function(s){s.dataset.zone='10971658',s.src='https://n6wxm.com/vignette.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>
<script src="https://quge5.com/88/tag.min.js" data-zone="236778" async data-cfasync="false"></script>
<body class="page-detail" data-page="detail">
    <div id="loader">
        <div class="spinner"></div>
    </div>

    <div class="app-shell">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <button class="sidebar-menu" type="button" aria-label="Open menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <a class="brand-link" href="index.html" aria-label="FeemX home">
                    <img class="brand-mark" src="logo.svg" alt="FeemX logo">
                    <span class="brand-text">FEEMX</span>
                </a>
            </div>

            <div class="sidebar-language">
                <span>ENGLISH</span>
                <span class="language-caret">v</span>
            </div>

            <nav class="sidebar-nav" data-sidebar-nav></nav>

            <div class="sidebar-footer">
                <p></p>
            </div>
        </aside>

        <main class="content-area detail-content">
            <header class="topbar">
                <form class="topbar-search">
                    <input class="search-input" id="searchInput" type="search" placeholder="Search movies / TV shows"
                        aria-label="Search movies">
                </form>
                <div class="topbar-actions">
                    <a class="pill-btn ghost-btn" href="movie.html?id=2">Featured Pick</a>
                    <a class="pill-btn solid-btn" id="topWatchLink" href="#">Watch</a>
                </div>
            </header>

            <section class="watch-layout animate-on-scroll">
                <div class="player-panel">
                    <div class="player-stage" id="movieBackdrop">
                        <video id="moviePlayer" class="movie-player" playsinline preload="metadata" hidden></video>
                        <div class="player-stage-overlay"></div>
                        <button class="player-center-play watch-btn" id="playerWatchButton" type="button">Play</button>
                    </div>
                    <div class="player-controls">
                        <div class="player-progress">
                            <span class="progress-fill"></span>
                        </div>
                        <div class="player-controls-row">
                            <div class="controls-left">
                                <button class="icon-control" id="playerRewindButton" type="button" aria-label="Back 10 seconds">&#8630;</button>
                                <button class="icon-control" id="playerToggleButton" type="button" aria-label="Play">&#9654;</button>
                                <button class="icon-control" id="playerForwardButton" type="button" aria-label="Forward 10 seconds">&#8631;</button>
                                <button class="icon-control" id="playerMuteButton" type="button" aria-label="Mute">&#128263;</button>
                                <span id="playerTime">00:05 / 01:53:31</span>
                            </div>
                            <div class="controls-right">
                                <span id="playerLanguageLabel">English</span>
                                <span id="playerSourceLabel">Source</span>
                                <span id="playerQualityLabel">Auto</span>
                                <span id="playerCaptionLabel">Captions Off</span>
                                <button class="icon-control" id="playerFullscreenButton" type="button" aria-label="Toggle fullscreen">&#9974;</button>
                            </div>
                        </div>
                    </div>
                </div>

                <aside class="resource-panel">
                    <div class="resource-actions">
                        <button class="resource-icon" id="refreshDetailButton" type="button">Refresh</button>
                        <button class="resource-icon" id="downloadButton" type="button">Download</button>
                        <button class="resource-icon" id="prevMovieButton" type="button">Prev</button>
                        <button class="resource-icon" id="nextMovieButton" type="button">Next</button>
                    </div>
                    <div class="resource-copy">
                        <h1 id="movieTitle">Movie Title</h1>
                        <p id="movieRating">Rating and year</p>
                        <p id="movieDesc">Movie description goes here.</p>
                    </div>
                    <div class="resource-box">
                        <h2>Resources</h2>
                        <p>Source: fzmovies.cms | By s</p>
                        <label class="resource-select-wrap">
                            <span class="visually-hidden">Audio option</span>
                            <select class="resource-select">
                                <option>Original Audio</option>
                                <option>English Dub</option>
                            </select>
                        </label>
                        <label class="resource-select-wrap">
                            <span class="visually-hidden">Subtitle option</span>
                            <select class="subtitle-select">
                                <option>Captions Off</option>
                            </select>
                        </label>
                        <button class="support-btn" type="button">Send Help</button>
                    </div>
                </aside>
            </section>

            <section class="content-section related-section animate-on-scroll" id="seriesCollection" hidden>
                <div class="section-heading">
                    <h2 id="seriesSectionTitle">Series List</h2>
                    <span id="seriesSectionMeta"></span>
                </div>
                <div class="slider-section">
                    <button class="slider-controls prev" type="button">&#8249;</button>
                    <button class="slider-controls next" type="button">&#8250;</button>
                    <div class="slider-container series-list"></div>
                </div>
            </section>

            <section class="content-section related-section animate-on-scroll" id="relatedMovies">
                <div class="section-heading">
                    <h2>Related Movies</h2>
                    <span></span>
                </div>
                <div class="slider-section">
                    <button class="slider-controls prev" type="button">&#8249;</button>
                    <button class="slider-controls next" type="button">&#8250;</button>
                    <div class="slider-container related-movies"></div>
                </div>
            </section>

            <section class="content-section animate-on-scroll" id="detailTrending">
                <div class="section-heading">
                    <h2>Trending Now</h2>
                    <span></span>
                </div>
                <div class="slider-section detail-trending">
                    <button class="slider-controls prev" type="button">&#8249;</button>
                    <button class="slider-controls next" type="button">&#8250;</button>
                    <div class="slider-container trending-container"></div>
                </div>
            </section>

            <section class="content-section action animate-on-scroll" id="detailAction">
                <div class="section-heading">
                    <h2>Action</h2>
                    <span></span>
                </div>
                <div class="slider-section">
                    <button class="slider-controls prev" type="button">&#8249;</button>
                    <button class="slider-controls next" type="button">&#8250;</button>
                    <div class="slider-container"></div>
                </div>
            </section>

            <section class="content-section comedy animate-on-scroll" id="detailComedy">
                <div class="section-heading">
                    <h2>Comedy</h2>
                    <span></span>
                </div>
                <div class="slider-section">
                    <button class="slider-controls prev" type="button">&#8249;</button>
                    <button class="slider-controls next" type="button">&#8250;</button>
                    <div class="slider-container"></div>
                </div>
            </section>

            <section class="content-section drama animate-on-scroll" id="detailDrama">
                <div class="section-heading">
                    <h2>Drama</h2>
                    <span></span>
                </div>
                <div class="slider-section">
                    <button class="slider-controls prev" type="button">&#8249;</button>
                    <button class="slider-controls next" type="button">&#8250;</button>
                    <div class="slider-container"></div>
                </div>
            </section>
        </main>
    </div>

    <div id="movieModal">
        <div class="modal-content">
            <div class="modal-info" id="modalContent"></div>
            <button id="modalClose" type="button" aria-label="Close preview">&times;</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>
    <script src="config.js?v=20260423e"></script>
    <script src="script.js?v=20260423e"></script>
</body>

</html>
