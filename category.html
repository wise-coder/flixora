<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FeemX - Category</title>
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=20260422a">
</head>

<body class="page-category" data-page="category">
    <div id="loader">
        <div class="spinner"></div>
    </div>

    <div class="app-shell">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <button class="sidebar-menu" type="button" aria-label="Open menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <a class="brand-link" href="index.html" aria-label="FeemX home">
                    <img class="brand-mark" src="logo.svg" alt="FeemX logo">
                    <span class="brand-text">FEEMX</span>
                </a>
            </div>

            <div class="sidebar-language">
                <span>ENGLISH</span>
                <span class="language-caret">v</span>
            </div>

            <nav class="sidebar-nav" data-sidebar-nav></nav>

            <div class="sidebar-footer">
                <p></p>
            </div>
        </aside>

        <main class="content-area category-content">
            <header class="topbar">
                <form class="topbar-search">
                    <input class="search-input" id="searchInput" type="search" placeholder="Search movies / TV shows"
                        aria-label="Search movies">
                </form>
                <div class="topbar-actions">
                    <a class="pill-btn ghost-btn" href="movie.html?id=2">Featured Pick</a>
                    <a class="pill-btn solid-btn" href="#categoryGrid">Browse Now</a>
                </div>
            </header>

            <section class="detail-hero animate-on-scroll" id="categoryHero">
                <div class="detail-hero-overlay"></div>
                <div class="detail-hero-content">
                    <span class="eyebrow">Category Spotlight</span>
                    <h1 id="categoryTitle">Category</h1>
                    <p id="categoryMeta"></p>
                    <p id="categoryDesc"></p>
                    <div class="hero-actions">
                        <a class="watch-btn" href="#categoryGrid">Explore Titles</a>
                        <a class="hero-secondary" href="index.html">Back To Home</a>
                    </div>
                </div>
            </section>

            <section class="content-section animate-on-scroll" id="categoryGrid">
                <div class="section-heading">
                    <h2 id="categorySectionTitle">Category Movies</h2>
                    <span id="categoryCount"></span>
                </div>
                <div class="slider-section category-slider">
                    <button class="slider-controls prev" type="button">&#8249;</button>
                    <button class="slider-controls next" type="button">&#8250;</button>
                    <div class="slider-container category-container"></div>
                </div>
            </section>

            <section class="content-section animate-on-scroll" id="moreCategories">
                <div class="section-heading">
                    <h2>Keep Browsing</h2>
                    <span></span>
                </div>
                <div class="slider-section trending">
                    <button class="slider-controls prev" type="button">&#8249;</button>
                    <button class="slider-controls next" type="button">&#8250;</button>
                    <div class="slider-container trending-container"></div>
                </div>
            </section>
        </main>
    </div>

    <div id="movieModal">
        <div class="modal-content">
            <div class="modal-info" id="modalContent"></div>
            <button id="modalClose" type="button" aria-label="Close preview">&times;</button>
        </div>
    </div>

    <script src="config.js?v=20260423d"></script>
    <script src="script.js?v=20260423d"></script>
</body>

</html>
